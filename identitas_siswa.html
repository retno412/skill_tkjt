<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Identitas Siswa - SMK AMI Deltamas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-cyan-500"></div>
        
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-blue-500/10 text-blue-400 rounded-xl mb-3 border border-blue-500/20">
                <i class="fa-solid fa-id-card text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Skill Passport</h1>
            <p class="text-slate-400 text-sm mt-1">Isi identitas untuk memulai tes diagnostik TJKT</p>
        </div>

        <form id="formIdentitas" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Nama Lengkap</label>
                <input type="text" id="nama" required placeholder="Masukkan nama sesuai absen" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">NISN</label>
                <input type="number" id="nisn" required placeholder="10 digit nomor NISN" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Kelas</label>
                <select id="kelas" required 
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-blue-500 transition-colors text-sm">
                    <option value="" disabled selected class="text-slate-600">Pilih Kelas X TJKT</option>
                    <option value="X TJKT 1">X TJKT 1</option>
                    <option value="X TJKT 2">X TJKT 2</option>
                    <option value="X TJKT 3">X TJKT 3</option>
                </select>
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-semibold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-950 flex items-center justify-center gap-2 text-sm mt-2">
                Simpan & Mulai Level 0 <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('formIdentitas').addEventListener('submit', async function(e) {
            e.preventDefault();
            const nama = document.getElementById('nama').value.trim();
            const nisn = document.getElementById('nisn').value.trim();
            const kelas = document.getElementById('kelas').value;

            const targetSiswa = {
                id_pengerjaan: 'SKILL-' + Date.now(),
                nama: nama,
                nisn: nisn,
                kelas: kelas,
                timestamp: new Date().toISOString()
            };

            // Simpan ke Session Storage local browser agar halaman lain mengenali siswa ini
            sessionStorage.setItem('active_siswa', JSON.stringify(targetSiswa));

            // Kirim data dasar ke Supabase (opsional/bisa dirangkap saat kirim skor akhir)
            try {
                if (window.supabaseClient) {
                    await window.supabaseClient.from('siswa_passport').insert([{
                        id_pengerjaan: targetSiswa.id_pengerjaan,
                        nama: nama,
                        nisn: nisn,
                        kelas: kelas
                    }]);
                }
            } catch (err) {
                console.warn("Offline mode / Gagal simpan identitas awal ke cloud:", err.message);
            }

            // Alihkan langsung secara halus ke Level 0
            window.location.href = 'level0_pengetahuan_umum.html';
        });
    </script>
</body>
</html>
