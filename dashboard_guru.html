<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Guru & Analitik Kelas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="assets/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="assets/app.js"></script>
</head>
<body class="p-4 md:p-8">
  <script>AppCore.checkAdminAccess();</script>

  <div id="navbar-placeholder"></div>
  <main class="max-w-6xl mx-auto mt-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
      <div>
        <h1 class="text-2xl font-black tracking-tight">MONITORING DIAGNOSTIK TKJT</h1>
        <p class="text-xs font-mono text-cyan-400">ADMIN CONTROL PANEL PANEL</p>
      </div>
      <button onclick="eksporLaporanCSV()" class="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-blue-600 to-cyan-600 rounded-lg text-white font-bold text-sm shadow transition hover:brightness-110">
        <i data-lucide="database" class="w-4 h-4"></i> Ekspor Semua Data (CSV)
      </button>
    </div>

    <div class="cyber-card overflow-hidden">
      <div class="p-4 border-b border-gray-800 bg-slate-900/50 flex justify-between items-center">
        <span class="font-mono text-xs font-bold tracking-widest text-gray-400">Daftar Hasil Uji Karakter Siswa Terbaru</span>
        <span class="bg-cyan-500/10 text-cyan-400 text-[10px] px-2 py-0.5 rounded-full font-mono border border-cyan-500/20">LIVE</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm font-sans">
          <thead class="bg-black/40 text-xs font-mono uppercase tracking-wider text-gray-400 border-b border-gray-800">
            <tr>
              <th class="p-4">Nama Siswa</th>
              <th class="p-4">NIS</th>
              <th class="p-4">Kelas</th>
              <th class="p-4">Jenis Modul</th>
              <th class="p-4 text-center">Score SE</th>
              <th class="p-4 text-center">Score JKT</th>
              <th class="p-4">Status Esai</th>
            </tr>
          </thead>
          <tbody id="table-body-laporan" class="divide-y divide-gray-800">
            <tr class="hover:bg-slate-800/30 transition">
              <td class="p-4 font-semibold text-white">Ahmad Fauzi</td>
              <td class="p-4 font-mono text-xs text-gray-400">20261001</td>
              <td class="p-4 text-gray-300">X-TJKT-1</td>
              <td class="p-4"><span class="px-2 py-0.5 rounded bg-blue-500/10 text-blue-400 text-xs border border-blue-500/20">Minat Masa Depan</span></td>
              <td class="p-4 text-center font-mono font-bold text-blue-400">75%</td>
              <td class="p-4 text-center font-mono font-bold text-cyan-400">25%</td>
              <td class="p-4"><span class="text-yellow-500 text-xs font-semibold flex items-center gap-1"><i data-lucide="activity" class="w-3 h-3"></i> Pending Grading</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="assets/components.js"></script>
  <script>
    lucide.createIcons();

    function eksporLaporanCSV() {
      // Logic ringkas pembentukan generator blob csv text dari array data database view
      let csvContent = "data:text/csv;charset=utf-8,Nama,NIS,Kelas,Jenis_Tes,Persen_SE,Persen_JKT,Tanggal\n";
      csvContent += "Ahmad Fauzi,20261001,X-TJKT-1,Minat Masa Depan,75,25,2026-06-14\n";
      
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "REKAP_DIAGNOSTIK_TKJT_AMI.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
